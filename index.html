<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JZtodo Timer Light</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #eef9f2;
      --border: #f1d5c5;
      --text: #5b4747;
      --muted: #9b7f7f;
      --timer-status: #7a6262;
      --input: #fffaf6;
      --btn: #ffe8dc;
      --ring: #f4a261;
      --ring-inner: #fffaf6;
    }
    html, body {
      background: #ffffff !important;
      color: #5b4747 !important;
    }
    .page-card {
      background: #eef9f2 !important;
      border-color: #f1d5c5 !important;
    }
  </style>
  <link rel="stylesheet" href="style.light.css?v=20260325-light-hardcut" />
</head>
<body>
  <button id="bgm-toggle" class="bgm-toggle" type="button" aria-label="BGM 设置">♪</button>
  <div class="page-card">
  <section id="timer-module">
    <div class="timer-header">
      <h2>倒计时</h2>
    </div>
    <div class="module-card">
      <div class="timer-row">
        <div class="timer-display">
          <div class="timer-ring" id="timer-ring">
            <span id="timer-remaining">90:00</span>
          </div>
        </div>
        <div class="timer-controls">
        <label for="timer-minutes">时长（min）</label>
        <input id="timer-minutes" type="number" inputmode="numeric" min="1" step="1" value="90" />
        <button id="timer-toggle" type="button">开始</button>
        <button id="timer-stop" type="button">结束</button>
      </div>
        <div id="timer-status" aria-live="polite"></div>
        <div id="timer-inline-prompt" class="timer-inline-prompt hidden" aria-live="polite">
          <span id="timer-inline-prompt-text" class="timer-inline-prompt-text"></span>
          <div class="timer-inline-prompt-actions">
            <button id="timer-inline-prompt-confirm" type="button">确定</button>
            <button id="timer-inline-prompt-cancel" type="button">取消</button>
          </div>
        </div>
        <div id="bgm-status" class="bgm-status" aria-live="polite">BGM：未播放</div>
      </div>
    </div>
  </section>

  <section id="date-module">
    <h2>日期</h2>
    <div class="date-row">
      <button id="date-prev" type="button">前一天</button>
      <input id="date-picker" type="date" aria-label="选择日期" />
      <span id="date-weekday"></span>
      <button id="date-next" type="button">后一天</button>
      <button id="date-reset" type="button">回到今日</button>
      <div class="date-sync-group">
        <button id="sync-btn" type="button">同步</button>
        <button id="sync-pull-btn" type="button">拉取</button>
        <button id="sync-full-btn" type="button">上传</button>
        <button id="sync-clear-btn" type="button">清空云端</button>
      </div>
      <span id="sync-status" class="sync-status">未同步</span>
    </div>
  </section>

  <div id="recurrence-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>重复规则</h3>
        <button id="recurrence-close" type="button" class="modal-close">关闭</button>
      </div>
      <ul id="recurrence-list"></ul>
      <div class="modal-divider"></div>
      <div class="modal-form">
        <select id="recurrence-category" aria-label="选择重复任务种类">
          <option value="Work" selected>Work</option>
          <option value="Life">Life</option>
          <option value="Health">Health</option>
          <option value="Social">Social</option>
          <option value="Growth">Growth</option>
          <option value="Leisure">Leisure</option>
          <option value="Plan">Plan</option>
        </select>
        <input id="recurrence-text" placeholder="输入重复事项内容" />
        <div class="recurrence-frequency">
          <select id="recurrence-type">
            <option value="daily">每天重复</option>
            <option value="weekly">每周重复</option>
            <option value="monthly">每月重复</option>
            <option value="yearly">每年重复</option>
            <option value="workday">每个工作日重复</option>
            <option value="custom">自定义重复</option>
          </select>
          <div id="recurrence-weekly" class="hidden">
            <span class="recurrence-label">星期</span>
            <label><input type="checkbox" value="1" />一</label>
            <label><input type="checkbox" value="2" />二</label>
            <label><input type="checkbox" value="3" />三</label>
            <label><input type="checkbox" value="4" />四</label>
            <label><input type="checkbox" value="5" />五</label>
            <label><input type="checkbox" value="6" />六</label>
            <label><input type="checkbox" value="0" />日</label>
          </div>
          <div id="recurrence-monthly" class="hidden">
            <span class="recurrence-label">日期</span>
            <select id="recurrence-day"></select>
          </div>
          <div id="recurrence-yearly" class="hidden">
            <span class="recurrence-label">月</span>
            <select id="recurrence-month"></select>
            <span class="recurrence-label">日</span>
            <select id="recurrence-year-day"></select>
          </div>
          <div id="recurrence-custom" class="hidden">
            <select id="recurrence-interval">
              <option value="1">每 1</option>
              <option value="2">每 2</option>
              <option value="3">每 3</option>
              <option value="4">每 4</option>
              <option value="5">每 5</option>
              <option value="6">每 6</option>
              <option value="7">每 7</option>
            </select>
            <select id="recurrence-unit">
              <option value="day">天</option>
              <option value="week">周</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>
        <div class="recurrence-form-actions">
          <button id="recurrence-add" type="button">新增</button>
        </div>
      </div>
    </div>
  </div>

  <div id="recurrence-edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>修改重复规则</h3>
        <button id="recurrence-edit-close" type="button" class="modal-close">关闭</button>
      </div>
      <div class="modal-form">
        <select id="recurrence-edit-category" aria-label="选择重复任务种类">
          <option value="Work" selected>Work</option>
          <option value="Life">Life</option>
          <option value="Health">Health</option>
          <option value="Social">Social</option>
          <option value="Growth">Growth</option>
          <option value="Leisure">Leisure</option>
          <option value="Plan">Plan</option>
        </select>
        <input id="recurrence-edit-text" placeholder="输入重复事项内容" />
        <div class="recurrence-frequency">
          <select id="recurrence-edit-type">
            <option value="daily">每天重复</option>
            <option value="weekly">每周重复</option>
            <option value="monthly">每月重复</option>
            <option value="yearly">每年重复</option>
            <option value="workday">每个工作日重复</option>
            <option value="custom">自定义重复</option>
          </select>
          <div id="recurrence-edit-weekly" class="hidden">
            <span class="recurrence-label">星期</span>
            <label><input type="checkbox" value="1" />一</label>
            <label><input type="checkbox" value="2" />二</label>
            <label><input type="checkbox" value="3" />三</label>
            <label><input type="checkbox" value="4" />四</label>
            <label><input type="checkbox" value="5" />五</label>
            <label><input type="checkbox" value="6" />六</label>
            <label><input type="checkbox" value="0" />日</label>
          </div>
          <div id="recurrence-edit-monthly" class="hidden">
            <span class="recurrence-label">日期</span>
            <select id="recurrence-edit-day"></select>
          </div>
          <div id="recurrence-edit-yearly" class="hidden">
            <span class="recurrence-label">月</span>
            <select id="recurrence-edit-month"></select>
            <span class="recurrence-label">日</span>
            <select id="recurrence-edit-year-day"></select>
          </div>
          <div id="recurrence-edit-custom" class="hidden">
            <select id="recurrence-edit-interval">
              <option value="1">每 1</option>
              <option value="2">每 2</option>
              <option value="3">每 3</option>
              <option value="4">每 4</option>
              <option value="5">每 5</option>
              <option value="6">每 6</option>
              <option value="7">每 7</option>
            </select>
            <select id="recurrence-edit-unit">
              <option value="day">天</option>
              <option value="week">周</option>
              <option value="month">月</option>
              <option value="year">年</option>
            </select>
          </div>
        </div>
        <div class="recurrence-form-actions">
          <button id="recurrence-edit-cancel" type="button">取消</button>
          <button id="recurrence-edit-save" type="button">保存</button>
        </div>
      </div>
    </div>
  </div>

  <section id="summary-module">
    <div class="contribution-card focus-rating-card">
      <div class="contribution-header">
        <h3>专注次数</h3>
      </div>
      <div id="summary-rating" class="summary-rating" aria-label="今日评分">
        <button type="button" class="star" data-star="1" aria-label="星级 1"></button>
        <button type="button" class="star" data-star="2" aria-label="星级 2"></button>
        <button type="button" class="star" data-star="3" aria-label="星级 3"></button>
        <button type="button" class="star" data-star="4" aria-label="星级 4"></button>
        <button type="button" class="star" data-star="5" aria-label="星级 5"></button>
      </div>
      <p id="summary-status" aria-live="polite"></p>
    </div>
    <div class="contribution-card">
      <div class="contribution-header">
        <h3 id="timer-timeline-title">当日工作时间段</h3>
        <span id="timer-timeline-summary" class="contribution-summary"></span>
      </div>
      <div id="timer-timeline-chart" class="timer-timeline-chart" aria-label="当日工作时间段可视化图"></div>
    </div>
    <div class="contribution-card">
      <div class="contribution-header">
        <h3 id="contribution-title">当月热力图</h3>
        <span id="contribution-summary" class="contribution-summary"></span>
      </div>
      <div id="contribution-chart" class="contribution-chart" aria-label="当月热力图"></div>
    </div>
  </section>

  <script type="module" src="app/app.js?v=20260325-light-only"></script>
  </div>

  <div id="bgm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <div class="modal-header">
        <h3>BGM 设置</h3>
        <button id="bgm-close" type="button" class="modal-close">关闭</button>
      </div>
      <div class="bgm-current">
        当前音乐：<span id="bgm-current-name">pinknoise</span>
      </div>
      <div class="bgm-picker">
        <input id="bgm-file" type="file" accept="audio/*" />
      </div>
      <div class="bgm-volume">
        <label for="bgm-volume">音量</label>
        <input id="bgm-volume" type="range" min="0" max="100" value="60" />
      </div>
      <div class="bgm-volume">
        <label for="alarm-volume">铃声音量</label>
        <input id="alarm-volume" type="range" min="0" max="100" value="15" />
      </div>
    </div>
  </div>

  <div id="timeline-edit-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card timeline-edit-card">
      <div class="modal-header">
        <h3 id="timeline-edit-title">修改时间段</h3>
        <button id="timeline-edit-close" type="button" class="modal-close">关闭</button>
      </div>
      <div id="timeline-edit-list" class="timeline-edit-list"></div>
      <div class="timeline-edit-actions">
        <button id="timeline-edit-add" type="button" class="header-action timeline-edit-add" aria-label="增加时间片段">+</button>
        <button id="timeline-edit-save" type="button" class="progress-btn timeline-edit-save">保存</button>
      </div>
    </div>
  </div>

  <div id="prompt-modal" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-card prompt-card">
      <div id="prompt-message" class="prompt-message"></div>
      <div class="prompt-actions">
        <button id="prompt-cancel" type="button" class="modal-close">取消</button>
        <button id="prompt-confirm" type="button" class="progress-btn prompt-confirm">确定</button>
      </div>
    </div>
  </div>

</body>
</html>
